services:
  postgres:
    image: postgres:16-alpine
    container_name: jobhunter-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: jobhunter
      POSTGRES_USER: jobhunter
      POSTGRES_PASSWORD: jobhunter

    ports:
      - "5434:5432"

    volumes:
      - jobhunter_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhunter -d jobhunter"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jobhunter_postgres_data: