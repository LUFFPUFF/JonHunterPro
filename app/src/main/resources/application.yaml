spring:
  application:
    name: jobhunter-pro

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://${JOBHUNTER_DB_HOST:localhost}:${JOBHUNTER_DB_PORT:5434}/${JOBHUNTER_DB_NAME:jobhunter}
    username: ${JOBHUNTER_DB_USER:jobhunter}
    password: ${JOBHUNTER_DB_PASSWORD:jobhunter}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: JobHunterHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

jobhunter:
  hh:
    questionnaire:
      execution-mode: APPLY

  logging:
    path: ${JOBHUNTER_LOGGING_PATH:logs}
    console-level: ${JOBHUNTER_LOGGING_CONSOLE_LEVEL:INFO}
    file-level: ${JOBHUNTER_LOGGING_FILE_LEVEL:DEBUG}

  llm:
    groq:
      enabled: ${GROQ_ENABLED:false}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
      api-key: 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
      model: ${GROQ_MODEL:openai/gpt-oss-120b}
      reasoning-effort: ${GROQ_REASONING_EFFORT:low}
      connect-timeout-seconds: ${GROQ_CONNECT_TIMEOUT_SECONDS:15}
      read-timeout-seconds: ${GROQ_READ_TIMEOUT_SECONDS:120}
      write-timeout-seconds: ${GROQ_WRITE_TIMEOUT_SECONDS:30}

    ollama:
      enabled: false
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:qwen3:14b}
      connect-timeout-seconds: ${OLLAMA_CONNECT_TIMEOUT_SECONDS:10}
      read-timeout-seconds: ${OLLAMA_READ_TIMEOUT_SECONDS:300}
      write-timeout-seconds: ${OLLAMA_WRITE_TIMEOUT_SECONDS:30}
      context-length: ${OLLAMA_CONTEXT_LENGTH:8192}
      keep-alive: ${OLLAMA_KEEP_ALIVE:10m}

    openrouter:
      enabled: false
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai}
      api-key: ${OPENROUTER_API_KEY:}
      primary-model: ${OPENROUTER_PRIMARY_MODEL:qwen/qwen3-next-80b-a3b-instruct:free}
      fallback-models: ${OPENROUTER_FALLBACK_MODELS:openai/gpt-oss-20b:free}
      http-referer: ${OPENROUTER_HTTP_REFERER:https://jobhunterpro.local}
      application-title: ${OPENROUTER_APPLICATION_TITLE:JobHunterPro}
      connect-timeout-seconds: ${OPENROUTER_CONNECT_TIMEOUT_SECONDS:60}
      read-timeout-seconds: ${OPENROUTER_READ_TIMEOUT_SECONDS:90}
      write-timeout-seconds: ${OPENROUTER_WRITE_TIMEOUT_SECONDS:60}

  integrations:
    hh:
      api:
        base-url: ${HH_API_BASE_URL:https://api.hh.ru}
        user-agent: ${HH_USER_AGENT:JobHunterPro/0.1.0 (beatsluffi@gmail.com)}
        allow-non-hh-base-url: ${HH_API_ALLOW_NON_HH_BASE_URL:false}
      oauth:
        authorization-url: https://hh.ru/oauth/authorize
        token-url: https://api.hh.ru/token
        client-id: KRLC5IVGCVG50S24L3JMUV8B5CU93QHS70O9IP91DM2G36LSM9S2R9D14NUFAGG9
        client-secret: GPVKQ9SR62QKTCVQFETHTIIKIE3I9TLM0DO8SH7IS0S75LFL98L80AM1OI9IABGC
        redirect-uri: jobhunterpro://oauth/hh/callback
        redirect-mode: ${HH_REDIRECT_MODE:LOCAL_HTTP_SERVER}
        callback-port: ${HH_CALLBACK_PORT:54345}
        state-byte-length: ${HH_OAUTH_STATE_BYTE_LENGTH:32}
        user-agent: ${HH_USER_AGENT:JobHunterPro/0.1.0 (beatsluffi@gmail.com)}
      application:
        access-token: APPLRHOTSV3IRS5O2LH4A1A4CHMM3GDNO5AV0G7EPPAFE03A1PK568AO8E7AFHE1
      auto-response:
        default-resume-id: dc4706b7ff0e7f30da0039ed1f736853636d64
        default-message: ${HH_AUTO_RESPONSE_DEFAULT_MESSAGE:Здравствуйте! Откликаюсь на вакансию "{vacancyName}". Буду рад обсудить детали.}
      browser-auto-response:
        enabled: ${HH_BROWSER_AUTO_RESPONSE_ENABLED:true}
        mode: ${HH_BROWSER_AUTO_RESPONSE_MODE:EXECUTE}
        headless: ${HH_BROWSER_AUTO_RESPONSE_HEADLESS:false}
        user-data-dir: ${HH_BROWSER_USER_DATA_DIR:${user.home}/.jobhunterpro/hh-chrome-profile}
        wait-timeout-seconds: ${HH_BROWSER_WAIT_TIMEOUT_SECONDS:10}

    habr-career:
      api:
        base-url: ${HABR_CAREER_API_BASE_URL:https://career.habr.com/api}
        user-agent: ${HABR_CAREER_USER_AGENT:JobHunterPro/0.1.0 (beatsluffi@gmail.com)}
        allow-non-habr-career-base-url: ${HABR_CAREER_API_ALLOW_NON_HABR_CAREER_BASE_URL:false}

