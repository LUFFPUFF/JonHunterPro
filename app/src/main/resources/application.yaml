spring:
  application:
    name: jobhunter-pro

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://${JOBHUNTER_DB_HOST:localhost}:${JOBHUNTER_DB_PORT:5434}/${JOBHUNTER_DB_NAME:jobhunter}
    username: ${JOBHUNTER_DB_USER:jobhunter}
    password: ${JOBHUNTER_DB_PASSWORD:jobhunter}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: JobHunterHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

jobhunter:
  logging:
    path: ${JOBHUNTER_LOGGING_PATH:logs}
    console-level: ${JOBHUNTER_LOGGING_CONSOLE_LEVEL:INFO}
    file-level: ${JOBHUNTER_LOGGING_FILE_LEVEL:DEBUG}

  integrations:
    hh:
      api:
        base-url: ${HH_API_BASE_URL:https://api.hh.ru}
        user-agent: ${HH_USER_AGENT:JobHunterPro/0.1.0 (beatsluffi@gmail.com)}
        allow-non-hh-base-url: ${HH_API_ALLOW_NON_HH_BASE_URL:false}
      oauth:
        authorization-url: https://hh.ru/oauth/authorize
        token-url: https://api.hh.ru/token
        client-id: KRLC5IVGCVG50S24L3JMUV8B5CU93QHS70O9IP91DM2G36LSM9S2R9D14NUFAGG9
        client-secret: GPVKQ9SR62QKTCVQFETHTIIKIE3I9TLM0DO8SH7IS0S75LFL98L80AM1OI9IABGC
        redirect-uri: jobhunterpro://oauth/hh/callback
        redirect-mode: ${HH_REDIRECT_MODE:LOCAL_HTTP_SERVER}
        callback-port: ${HH_CALLBACK_PORT:54345}
        state-byte-length: ${HH_OAUTH_STATE_BYTE_LENGTH:32}
        user-agent: ${HH_USER_AGENT:JobHunterPro/0.1.0 (beatsluffi@gmail.com)}

    habr-career:
      api:
        base-url: ${HABR_CAREER_API_BASE_URL:https://career.habr.com/api}
        user-agent: ${HABR_CAREER_USER_AGENT:JobHunterPro/0.1.0 (beatsluffi@gmail.com)}
        allow-non-habr-career-base-url: ${HABR_CAREER_API_ALLOW_NON_HABR_CAREER_BASE_URL:false}

      oauth:
        authorization-url: ${HABR_CAREER_OAUTH_AUTHORIZATION_URL:https://career.habr.com/integrations/oauth/authorize}
        token-url: ${HABR_CAREER_OAUTH_TOKEN_URL:https://career.habr.com/integrations/oauth/token}
        client-id: kpgRrUQ5cOx-6bMCQPUoULEuzH3nT9MRj6RbPUd4KRQ
        client-secret: r5tRiMoe3wNfsjq_h3M9IxpattBnjUoLh90Ji-yeIyA
        redirect-uri: ${HABR_CAREER_REDIRECT_URI:jobhunterpro://oauth/habr/callback}
        allow-non-habr-career-oauth-urls: ${HABR_CAREER_OAUTH_ALLOW_NON_HABR_CAREER_URLS:false}
        state-byte-length: ${HABR_CAREER_OAUTH_STATE_BYTE_LENGTH:32}
        user-agent: ${HABR_CAREER_USER_AGENT:JobHunterPro/0.1.0 (beatsluffi@gmail.com)}

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: false

logging:
  level:
    ru.jobhunter: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

logging:
  level:
    ru.jobhunter: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN